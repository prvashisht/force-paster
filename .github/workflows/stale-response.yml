name: Stale Response

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  handle-response:
    runs-on: ubuntu-latest
    # Only run on issue comments (not PR comments), and only when the issue is open
    if: github.event.issue.pull_request == null && github.event.issue.state == 'open'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const comment = context.payload.comment;

            // Only react to comments from the issue author
            if (comment.user.login !== issue.user.login) return;

            const labels = issue.labels.map(l => l.name);

            // Only act if the issue is currently marked stale
            if (!labels.includes('stale')) return;

            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              name: 'stale',
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['needs-attention'],
            });
